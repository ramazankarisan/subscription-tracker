<!--
  EmailJS template for SubTrack.

  HOW TO USE
  ----------
  1. EmailJS dashboard → Email Templates → Create New Template.
  2. In the template's *Settings* tab set:
       To Email : {{to_email}}
       Subject  : {{subject}}
       From Name: SubTrack           (anything you like)
  3. Switch the *Content* editor to "Code"/HTML mode and paste the
     <table>…</table> block below (everything between the CONTENT markers).
  4. Save. Copy the Template ID and paste it into the app's Settings.

  The app sends three variables: {{to_email}}, {{subject}}, {{message}}.
  {{message}} is multi-line plain text, so it is rendered inside a block with
  white-space: pre-line to preserve the line breaks.
-->

<!-- ===== CONTENT START ===== -->
<table
  role="presentation"
  width="100%"
  cellpadding="0"
  cellspacing="0"
  style="
    background: #f6f6f9;
    padding: 24px 0;
    font-family:
      -apple-system,
      Segoe UI,
      Roboto,
      Helvetica,
      Arial,
      sans-serif;
  "
>
  <tr>
    <td align="center">
      <table
        role="presentation"
        width="100%"
        cellpadding="0"
        cellspacing="0"
        style="
          max-width: 520px;
          background: #ffffff;
          border: 1px solid #e5e3ec;
          border-radius: 14px;
          overflow: hidden;
        "
      >
        <!-- Header -->
        <tr>
          <td
            style="
              background: linear-gradient(135deg, #a78bfa, #6d28d9);
              padding: 20px 24px;
              color: #ffffff;
              font-size: 18px;
              font-weight: 700;
              letter-spacing: -0.02em;
            "
          >
            🔔 SubTrack reminder
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td
            style="
              padding: 24px;
              color: #1c1a24;
              font-size: 15px;
              line-height: 1.5;
            "
          >
            <p style="margin: 0 0 16px; color: #6b6375">
              Hi — here's what's coming up:
            </p>

            <div
              style="
                white-space: pre-line;
                background: #f1f0f6;
                border: 1px solid #e5e3ec;
                border-radius: 10px;
                padding: 16px;
                font-size: 14px;
                line-height: 1.6;
                color: #1c1a24;
              "
            >
              {{message}}
            </div>

            <p style="margin: 20px 0 0; color: #6b6375; font-size: 13px">
              Open the app to mark things as renewed or paid.
            </p>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td
            style="
              padding: 16px 24px;
              border-top: 1px solid #e5e3ec;
              color: #a49db2;
              font-size: 12px;
            "
          >
            Sent by SubTrack · Subscriptions &amp; Installments tracker
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
<!-- ===== CONTENT END ===== -->
