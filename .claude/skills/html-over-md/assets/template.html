<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
    <style>
      :root {
        --bg: #fdfdfc;
        --fg: #1a1a1a;
        --muted: #6b6b6b;
        --accent: #0b6bcb;
        --border: #e4e4e0;
        --code-bg: #f4f4f2;
        --note-bg: #eef5fd;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #16181c;
          --fg: #e6e6e3;
          --muted: #9a9aa0;
          --accent: #6cb0f5;
          --border: #2c2f36;
          --code-bg: #22252b;
          --note-bg: #1c2836;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font:
          16px/1.65 -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      main {
        max-width: 72ch;
        margin: 0 auto;
        padding: 3rem 1.5rem 5rem;
      }
      h1 {
        font-size: 1.9rem;
        line-height: 1.25;
        margin: 0 0 0.4rem;
      }
      .subtitle {
        color: var(--muted);
        margin: 0 0 2.2rem;
      }
      h2 {
        font-size: 1.3rem;
        margin: 2.4rem 0 0.7rem;
        padding-top: 1.2rem;
        border-top: 1px solid var(--border);
      }
      h3 {
        font-size: 1.05rem;
        margin: 1.6rem 0 0.4rem;
      }
      p {
        margin: 0.7rem 0;
      }
      a {
        color: var(--accent);
      }
      ul,
      ol {
        padding-left: 1.4rem;
      }
      li {
        margin: 0.3rem 0;
      }
      code {
        font:
          0.88em ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
        background: var(--code-bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 0.1em 0.35em;
      }
      pre {
        background: var(--code-bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.9rem 1.1rem;
        overflow-x: auto;
        line-height: 1.5;
      }
      pre code {
        background: none;
        border: none;
        padding: 0;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        margin: 1rem 0;
        font-size: 0.95rem;
      }
      th,
      td {
        text-align: left;
        padding: 0.5rem 0.75rem;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }
      th {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
      }
      .note {
        background: var(--note-bg);
        border-radius: 8px;
        padding: 0.8rem 1.1rem;
        margin: 1rem 0;
      }
      nav.toc {
        background: var(--code-bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.8rem 1.2rem;
        margin: 1.5rem 0 2rem;
        font-size: 0.95rem;
      }
      nav.toc ul {
        margin: 0.3rem 0;
      }
      footer {
        margin-top: 3rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>{{TITLE}}</h1>
      <p class="subtitle">{{ONE_LINE_SUMMARY}} · {{DATE}}</p>

      <!-- Optional, for 4+ sections:
      <nav class="toc">
        <strong>Contents</strong>
        <ul>
          <li><a href="#section-id">Section</a></li>
        </ul>
      </nav>
      -->

      <h2 id="section-id">Section</h2>
      <p>Body text. Reference code as <code>src/lib/dates.ts:42</code>.</p>

      <footer>Generated by Claude Code · {{DATE}}</footer>
    </main>
  </body>
</html>
